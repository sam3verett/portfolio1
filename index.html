<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/gonnacry.png">

  <title>sam everett</title>
  <meta name="description" content="sam's corner of the internet" />

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Baskervville:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --desk-bg:    #577b5b;
      --win-bg:     #f9f5f0;
      --win-head:   #eee8df;
      --bar-bg:     #577b5b;
      --border:     rgba(0, 0, 0, 0.15);
      --txt:        #26221e;
      --txt-muted:  #7d756c;
      --font-ui:    'DM Mono', monospace;
      --font-body:  "Baskervville", Georgia, serif;
      --btn-red:    #d45b5b;
      --btn-yellow: #d4a832;
      --btn-green:  #5aad6e;
      --bar-h:      40px;
    }

    #desktop {
      position: fixed;
      inset: 0;
      bottom: var(--bar-h);
      overflow: hidden;
      background-image: url('wallpaper-3.jpeg');
      background-size: cover;
      background-position: center;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --desk-bg:   #1c1a17;
        --win-bg:    #252220;
        --win-head:  #2e2b27;
        --bar-bg:    #1c1a17;
        --border:    rgba(255, 255, 255, 0.1);
        --txt:       #e4ddd4;
        --txt-muted: #9a8e84;
      }
      #desktop {
        background-image: url('wallpaper-2.jpeg');
        background-size: cover;
        background-position: center;
      }
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font-ui);
      font-size: 13px;
      background: var(--desk-bg);
      color: var(--txt);
      user-select: none;
      cursor: default;
      /* ↓ prevents pull-to-refresh on mobile */
      overscroll-behavior: none;
    }

    .window-body a {
  color: var(--txt);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.window-body a:hover { color: var(--txt-muted); }

.prose p { margin-bottom: 1.0em; }

    .icon-grid {
      position: absolute;
      top: 14px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 5;
    }

    .desk-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 8px 6px;
      width: 76px;
      border-radius: 9px;
      cursor: default;
      transition: background 0.12s;
    }

    .desk-icon:hover,
    .desk-icon:focus {
      background: rgba(255, 255, 255, 0.2);
      outline: none;
    }

    .desk-icon .icon-img {
      font-size: 28px;
      color: rgba(255, 255, 255, 0.93);
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.45));
    }

    .desk-icon .icon-label {
      font-size: 10.5px;
      text-align: center;
      color: rgba(255, 255, 255, 0.94);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
      line-height: 1.35;
      word-break: break-all;
    }

    .window {
      position: absolute;
      background: var(--win-bg);
      border: 0.5px solid var(--border);
      border-radius: 11px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 280px;
    }

    .window-titlebar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      background: var(--win-head);
      border-bottom: 0.5px solid var(--border);
      cursor: grab;
      flex-shrink: 0;
    }

    .window-titlebar:active { cursor: grabbing; }

    .window-title {
      flex: 1;
      text-align: center;
      font-size: 11.5px;
      color: var(--txt-muted);
      font-weight: 400;
      pointer-events: none;
    }

    .traffic-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      transition: filter 0.1s;
    }

    .traffic-btn:hover { filter: brightness(1.15); }
    .btn-close  { background: var(--btn-red); }
    .btn-min    { background: var(--btn-yellow); }
    .btn-zoom   { background: var(--btn-green); }

    .window-body {
      overflow-y: auto;
      padding: 16px;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.8;
      color: var(--txt);
      flex: 1;
    }

    .window-body::-webkit-scrollbar { width: 4px; }
    .window-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--bar-h);
      background: var(--bar-bg);
      border-top: 0.5px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      z-index: 9999;
    }

    .taskbar-logo {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      margin-right: 4px;
      flex-shrink: 0;
    }

    .taskbar-btn {
      padding: 3px 11px;
      border-radius: 5px;
      font-size: 11px;
      font-family: var(--font-ui);
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      white-space: nowrap;
      transition: filter 0.1s;
    }

    .taskbar-btn:hover { filter: brightness(1.14); }

    .taskbar-btn.active {
      color: rgba(255, 255, 255, 0.92);
      background: rgba(255, 255, 255, 0.22);
    }

    .taskbar-btn.minimized {
      color: rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.07);
    }

    .taskbar-time {
      margin-left: auto;
      font-size: 11.5px;
      color: rgba(255,255,255,0.65);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .mono {
      font-family: var(--font-ui);
      font-size: 12.5px;
      line-height: 2;
      white-space: pre-wrap;
    }

    .prose {
      font-family: var(--font-body);
      font-size: 12.5px;
      line-height: 2;
      white-space: pre-wrap;
    }

    .file-list { display: flex; flex-direction: column; gap: 1px; }

    .file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 5px;
      font-family: var(--font-ui);
      font-size: 12.5px;
      color: var(--txt);
      transition: background 0.1s;
    }

    .file-row:hover { background: rgba(128, 120, 110, 0.11); }
    .file-row .file-icon { font-size: 14px; flex-shrink: 0; }
    .file-row .file-name { flex: 1; }
    .file-row .file-note { font-size: 11px; color: var(--txt-muted); }

    .finder-bar {
      background: rgba(128, 120, 110, 0.09);
      border-radius: 5px;
      padding: 5px 10px;
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--txt-muted);
      margin-bottom: 12px;
    }

    .section-label {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 400;
      color: var(--txt-muted);
      margin: 12px 0 5px;
    }

    .empty-hint {
      position: absolute;
      top: 46%;
      left: 56%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      color: rgba(255,255,255,0.45);
    }

    .empty-hint .star { font-size: 24px; margin-bottom: 7px; }
    .empty-hint .hint-text {
      font-size: 12px;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    @media (max-width: 600px) {
      .desk-icon { width: 60px; }
      .desk-icon .icon-label { font-size: 9.5px; }
    }
  </style>
</head>
<body>

  <div id="taskbar-root"></div>
  <div id="root" style="display:none"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const ITEMS = [
      { id: "about",    label: "about",    icon: "ti-file-text" },
      { id: "writing",  label: "writing",  icon: "ti-folder"    },
      { id: "reading",  label: "reading",  icon: "ti-book" },
      { id: "gallery", label: "gallery", icon: "ti-photo" },
      { id: "contact",  label: "contact",  icon: "ti-world"     },
    ];

    const WINS = {
      about:    { title: "about.txt",    w: 390, h: 265, x: 90,  y: 55  },
      writing:  { title: "writing/",     w: 430, h: 305, x: 118, y: 76  },
      reading:  { title: "reading.txt",  w: 372, h: 285, x: 174, y: 125 },
      gallery: { title: "gallery/", w: 400, h: 310, x: 220, y: 170 },
      contact:  { title: "contact.html", w: 352, h: 225, x: 200, y: 150 },
    };

    const CONTENT = {

      about: () => (
        <div className="prose">
<p><strong>sam everett</strong></p>

<p>undergraduate at texas christian university — b.a. sociology + english w/ global literature concentration, b.s. digital culture + data analytics (graduating may 2028)</p>

<p><strong>i think a lot about:</strong> how the law makes people, what it means to live in liminal spaces, why some stories are never finished</p>

<p><strong>currently:</strong> intern <a href="https://www.cloudflare.com" target="_blank">@cloudflare</a>, editor-in-chief <a href="https://bollerreview.tcu.edu/index.php/boller" target="_blank">@tcubollerreview</a></p>

<p><strong>after this:</strong> peace corps? law school? grad school? hopefully all three</p>

<p>✦ click the other files to explore</p>
        </div>
      ),

      writing: () => (
        <div className="prose">
          <p><strong>things I've made and am working on</strong></p>

<p><strong>substack:</strong> <a href="https://evergreendreams.substack.com" target="_blank">@evergreendreams</a> (most of my stuff goes here)</p>
<p>a novel based on the backrooms concept</p>
<p><a href="/work/soci-policy.pdf" target="_blank">essay</a> on Kansas law & transgender drivers' licenses</p>

        </div>
      ),

      

      reading: () => (
        <div className="prose">
{`currently reading
↳ Anna Badkhen - To See Beyond
↳ Robert Chapman - Empire of Normality: Neurodiversity and Capitalism
↳ Ocean Vuong - The Emperor of Gladness

favorites
↳ Ursula K. Le Guin - A Wizard of Earthsea
↳ Kaveh Akbar — Martyr! `}
        </div>
      ),


gallery: () => <Gallery />,

      

      contact: () => (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {[
            { label: 'email',     val: 'samuel.s.everett [at] tcu [dot] edu', icon: 'ti-mail'            },
            { label: 'signal', val: '@samsevr.95',                            icon: 'ti-message-circle' },
            
          ].map(c => (
            <div key={c.label} style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 14, color: 'var(--txt)' }}>
              <i className={`ti ${c.icon}`} style={{ fontSize: 16, color: 'var(--txt-muted)', width: 20, flexShrink: 0 }} aria-hidden="true" />
              <span style={{ color: 'var(--txt-muted)', width: 68, fontSize: 12, flexShrink: 0, fontFamily: 'var(--font-ui)' }}>{c.label}</span>
              <span>{c.val}</span>
            </div>
          ))}
        </div>
      ),

    }; /* ← end of CONTENT */

    // ─── add this function above FileRow ───────────────────────
function Gallery() {
  // ↓ put your image filenames here
  const photos = [
    'sam.jpeg',
    'gal-1.jpg',
    'gal-2.jpeg',
    'gal-3.png',
    'gal-4.PNG',
    'gal-5.JPG',
    'gal-6.JPG',
    'gal-7.JPG',
    'gal-8.JPG',
  ];
  const [idx, setIdx] = useState(0);
  const prev = () => setIdx(i => (i - 1 + photos.length) % photos.length);
  const next = () => setIdx(i => (i + 1) % photos.length);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      <img
        src={photos[idx]}
        style={{ width: '100%', height: 220, objectFit: 'cover', borderRadius: 8 }}
      />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <button onClick={prev} style={{ background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: 'var(--txt)' }}>←</button>
        <span style={{ fontFamily: 'var(--font-ui)', fontSize: 11, color: 'var(--txt-muted)' }}>
          {idx + 1} / {photos.length}
        </span>
        <button onClick={next} style={{ background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: 'var(--txt)' }}>→</button>
      </div>
    </div>
  );
}

    function FileRow({ icon, name, note, folderColor }) {
      return (
        <div className="file-row">
          <i className={`ti ${icon} file-icon`}
            style={{ color: folderColor ? '#c4a35a' : 'var(--txt-muted)' }}
            aria-hidden="true" />
          <span className="file-name">{name}</span>
          {note && <span className="file-note">{note}</span>}
        </div>
      );
    }


    function Desktop() {
      const [windows, setWindows] = useState([]);
      const [time, setTime] = useState(() =>
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      );
      const zRef   = useRef(10);
      const dragRef = useRef(null);

      /* Clock tick */
      useEffect(() => {
        const tick = setInterval(() =>
          setTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }))
        , 15000);
        return () => clearInterval(tick);
      }, []);

      /* Drag handlers — works for both mouse and touch */
      useEffect(() => {
        const onMove = (e) => {
          if (!dragRef.current) return;
          const { id, sx, sy, ox, oy } = dragRef.current;
          const point = e.touches ? e.touches[0] : e;
          setWindows(ws => ws.map(w =>
            w.id === id
              ? { ...w, x: Math.max(0, ox + point.clientX - sx), y: Math.max(0, oy + point.clientY - sy) }
              : w
          ));
        };
        const onUp = () => { dragRef.current = null; };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup',   onUp);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend',  onUp);

        return () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup',   onUp);
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend',  onUp);
        };
      }, []);

      /* Window management */
      const bringToFront = (id) => {
        zRef.current += 1;
        const z = zRef.current;
        setWindows(ws => ws.map(w => w.id === id ? { ...w, z } : w));
      };

      const openWindow = (id) => {
        if (windows.find(w => w.id === id)) {
          setWindows(ws => ws.map(w => w.id === id ? { ...w, minimized: false } : w));
          bringToFront(id);
          return;
        }
        zRef.current += 1;
        const def = WINS[id];
        const mobile = window.innerWidth < 600;
        // on mobile: size the window to fit the screen and center it
        // on desktop: use the default position and size
        const w = mobile ? Math.min(window.innerWidth - 24, def.w) : def.w;
        const h = mobile ? Math.min(window.innerHeight - 100, def.h) : def.h;
        const x = mobile ? (window.innerWidth - w) / 2 : def.x;
        const y = mobile ? (window.innerHeight - h) / 3 : def.y;
        setWindows(ws => [...ws, { id, title: def.title, w, h, x, y, z: zRef.current, minimized: false }]);
      };

      const closeWin    = (id) => setWindows(ws => ws.filter(w => w.id !== id));
      const minimizeWin = (id) => setWindows(ws => ws.map(w => w.id === id ? { ...w, minimized: true } : w));

      const startDrag = (e, id, ox, oy) => {
        e.preventDefault();
        e.stopPropagation();
        bringToFront(id);
        const point = e.touches ? e.touches[0] : e;
        dragRef.current = { id, sx: point.clientX, sy: point.clientY, ox, oy };
      };

      return (
        <>
          {/* ── Desktop area — onTouchMove blocks page scroll while dragging ── */}
          <div id="desktop" onTouchMove={(e) => e.preventDefault()}>

            {/* Icons */}
            <div className="icon-grid">
              {ITEMS.map(item => (
                <div
                  key={item.id}
                  className="desk-icon"
                  role="button"
                  tabIndex={0}
                  aria-label={`Open ${item.label}`}
                  onClick={() => openWindow(item.id)}
                  onKeyDown={(e) => (e.key === 'Enter' || e.key === ' ') && openWindow(item.id)}
                >
                  <i className={`ti ${item.icon} icon-img`} aria-hidden="true" />
                  <span className="icon-label">{item.label}</span>
                </div>
              ))}
            </div>

            {/* Windows */}
            {windows.filter(w => !w.minimized).map(win => (
              <div
                key={win.id}
                className="window"
                style={{ left: win.x, top: win.y, width: win.w, zIndex: win.z }}
                onMouseDown={() => bringToFront(win.id)}
                onTouchStart={() => bringToFront(win.id)}
              >
                <div
                  className="window-titlebar"
                  onMouseDown={(e) => startDrag(e, win.id, win.x, win.y)}
                  onTouchStart={(e) => startDrag(e, win.id, win.x, win.y)}
                >
                  <button className="traffic-btn btn-close"
                    onClick={(e) => { e.stopPropagation(); closeWin(win.id); }}
                    aria-label="Close window" />
                  <button className="traffic-btn btn-min"
                    onClick={(e) => { e.stopPropagation(); minimizeWin(win.id); }}
                    aria-label="Minimize window" />
                  <button className="traffic-btn btn-zoom"
                    aria-label="Zoom window" />
                  <span className="window-title">{win.title}</span>
                </div>
                <div className="window-body" style={{ height: win.h }}>
                  {CONTENT[win.id] && CONTENT[win.id]()}
                </div>
              </div>
            ))}
          </div>

          {/* ── Taskbar ── */}
          <div id="taskbar">
            <span className="taskbar-logo">✦</span>
            <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginRight: 4, fontFamily: 'var(--font-ui)' }}>
              samsevrOS
            </span>

            {windows.map(win => (
              <button
                key={win.id}
                className={`taskbar-btn ${win.minimized ? 'minimized' : 'active'}`}
                onClick={() => {
                  setWindows(ws => ws.map(w => w.id === win.id ? { ...w, minimized: false } : w));
                  bringToFront(win.id);
                }}
              >
                {WINS[win.id].title}
              </button>
            ))}

            <span className="taskbar-time">{time}</span>
          </div>
        </>
      );
    }

    /* Mount */
    const container = document.createElement('div');
    document.body.appendChild(container);
    ReactDOM.createRoot(container).render(<Desktop />);
  </script>

</body>
</html>
