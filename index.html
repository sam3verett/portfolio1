<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/gonnacry.jpg">

  <title>sam everett</title>
  <meta name="description" content="sam's corner of the internet" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Baskervville:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --desk-bg:    #577b5b;
      --win-bg:     #f9f5f0;
      --win-head:   #eee8df;
      --bar-bg:     #577b5b;
      --border:     rgba(0, 0, 0, 0.15);
      --txt:        #26221e;
      --txt-muted:  #7d756c;
      --font-ui:    'DM Mono', monospace;
      --font-body:  "Baskervville", Georgia, serif;
      --btn-red:    #d45b5b;
      --btn-yellow: #d4a832;
      --btn-green:  #5aad6e;
      --bar-h:      40px;
    }

    #desktop {
      position: fixed;
      inset: 0;
      bottom: var(--bar-h);
      overflow: hidden;
      background-image: url('wallpaper-3.jpeg');
      background-size: cover;
      background-position: center;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --desk-bg:   #1c1a17;
        --win-bg:    #252220;
        --win-head:  #2e2b27;
        --bar-bg:    #1c1a17;
        --border:    rgba(255, 255, 255, 0.1);
        --txt:       #e4ddd4;
        --txt-muted: #9a8e84;
      }
      #desktop {
        background-image: url('wallpaper-2.jpeg');
        background-size: cover;
        background-position: center;
      }
      .desk-icon .icon-img {
        color: rgba(255, 255, 255, 0.96);
        filter: drop-shadow(0 1px 6px rgba(0,0,0,0.7));
      }
      .desk-icon .icon-label {
        color: rgba(255, 255, 255, 0.97);
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
      }
      .desk-icon:hover,
      .desk-icon:focus {
        background: rgba(255, 255, 255, 0.15);
      }
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font-ui);
      font-size: 13px;
      background: var(--desk-bg);
      color: var(--txt);
      user-select: none;
      cursor: default;
      overscroll-behavior: none;
    }

    .window-body a {
      color: var(--txt);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .window-body a:hover { color: var(--txt-muted); }

    .prose {
      font-family: var(--font-body);
      font-size: 12.5px;
      line-height: 2;
      white-space: pre-wrap;
    }
    .prose p { margin-bottom: 1.0em; }

    .icon-grid {
      position: absolute;
      top: 14px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 5;
    }

    .desk-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 8px 6px;
      width: 76px;
      border-radius: 9px;
      cursor: default;
    }

    .desk-icon:hover,
    .desk-icon:focus {
      background: rgba(255, 255, 255, 0.2);
      outline: none;
    }

    .desk-icon .icon-img {
      font-size: 28px;
      color: rgba(255, 255, 255, 0.93);
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.45));
      line-height: 1;
    }

    .desk-icon .icon-label {
      font-size: 10.5px;
      text-align: center;
      color: rgba(255, 255, 255, 0.94);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
      line-height: 1.35;
      word-break: break-all;
    }

    .window {
      position: absolute;
      background: var(--win-bg);
      border: 0.5px solid var(--border);
      border-radius: 11px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 280px;
    }

    .window-titlebar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      background: var(--win-head);
      border-bottom: 0.5px solid var(--border);
      cursor: grab;
      flex-shrink: 0;
    }

    .window-titlebar:active { cursor: grabbing; }

    .window-title {
      flex: 1;
      text-align: center;
      font-size: 11.5px;
      color: var(--txt-muted);
      font-weight: 400;
      pointer-events: none;
    }

    .traffic-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    .traffic-btn:hover { filter: brightness(1.15); }
    .btn-close  { background: var(--btn-red); }
    .btn-min    { background: var(--btn-yellow); }
    .btn-zoom   { background: var(--btn-green); }

    .window-body {
      overflow-y: auto;
      padding: 16px;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.8;
      color: var(--txt);
      flex: 1;
    }

    .window-body::-webkit-scrollbar { width: 4px; }
    .window-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--bar-h);
      background: var(--bar-bg);
      border-top: 0.5px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      z-index: 9999;
    }

    .taskbar-logo {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      margin-right: 4px;
      flex-shrink: 0;
    }

    .taskbar-btn {
      padding: 3px 11px;
      border-radius: 5px;
      font-size: 11px;
      font-family: var(--font-ui);
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      white-space: nowrap;
    }

    .taskbar-btn:hover { filter: brightness(1.14); }

    .taskbar-btn.active {
      color: rgba(255, 255, 255, 0.92);
      background: rgba(255, 255, 255, 0.22);
    }

    .taskbar-btn.minimized {
      color: rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.07);
    }

    .taskbar-time {
      margin-left: auto;
      font-size: 11.5px;
      color: rgba(255,255,255,0.65);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .gallery-img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(0,0,0,0.06);
    }

    .gallery-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .gallery-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--txt);
      padding: 4px 8px;
    }

    .gallery-pos {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--txt-muted);
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--txt);
    }

    .contact-icon {
      font-size: 16px;
      width: 20px;
      flex-shrink: 0;
      text-align: center;
      line-height: 1;
    }

    .contact-label {
      color: var(--txt-muted);
      width: 68px;
      font-size: 12px;
      flex-shrink: 0;
      font-family: var(--font-ui);
    }

    @media (max-width: 600px) {
      #desktop { background-position: 70% center; }
      .desk-icon { width: 60px; }
      .desk-icon .icon-label { font-size: 9.5px; }
    }
  </style>
</head>
<body>

  <script>
    const { useState, useRef, useEffect, createElement: h } = React;

    const ITEMS = [
      { id: "about",    label: "about",    icon: "\uD83D\uDCC4" },
      { id: "writing",  label: "writing",  icon: "\uD83D\uDCC1" },
      { id: "reading",  label: "reading",  icon: "\uD83D\uDCD6" },
      { id: "gallery",  label: "gallery",  icon: "\uD83D\uDDBC\uFE0F" },
      { id: "contact",  label: "contact",  icon: "\uD83C\uDF10" },
    ];

    const WINS = {
      about:    { title: "about.txt",    w: 390, h: 265, x: 90,  y: 55  },
      writing:  { title: "writing/",     w: 430, h: 305, x: 118, y: 76  },
      reading:  { title: "reading.txt",  w: 372, h: 285, x: 174, y: 125 },
      gallery:  { title: "gallery/",     w: 400, h: 310, x: 220, y: 170 },
      contact:  { title: "contact.html", w: 352, h: 225, x: 200, y: 150 },
    };

    function a(href, label) {
      return h('a', { href, target: '_blank' }, label);
    }

    function strong(text) {
      return h('strong', null, text);
    }

    const CONTENT = {
      about: () => h('div', { className: 'prose' },
        h('p', null, strong('sam everett')),
        h('p', null, 'undergraduate at texas christian university \u2014 b.a. english w/ global literature concentration, b.s. sociology w/ data analytics minor (graduating may 2028)'),
        h('p', null, strong('i think a lot about:'), ' how the law makes people, what it means to live in liminal spaces, why some stories are never finished'),
        h('p', null, strong('currently:'), ' intern ', a('https://www.cloudflare.com', '@cloudflare'), ', editor-in-chief ', a('https://bollerreview.tcu.edu/index.php/boller', '@tcubollerreview')),
        h('p', null, strong('after this:'), ' law school? grad school? who knows'),
        h('p', null, '\u2726 click the other files to explore')
      ),

      writing: () => h('div', { className: 'prose' },
        h('p', null, strong("things I've made and am working on")),
        h('p', null, strong('substack:'), ' ', a('https://evergreendreams.substack.com', '@evergreendreams'), ' (most of my stuff goes here)'),
        h('p', null, 'a novel based on the backrooms concept'),
        h('p', null, a('/work/soci-policy.pdf', 'essay'), " on Kansas law & transgender drivers' licenses")
      ),

      reading: () => h('div', { className: 'prose' },
        h('p', null, strong('currently reading')),
        h('p', null, '\u21b3 Anna Badkhen \u2014 To See Beyond'),
        h('p', null, '\u21b3 Robert Chapman \u2014 Empire of Normality: Neurodiversity and Capitalism'),
        h('p', null, '\u21b3 Ocean Vuong \u2014 The Emperor of Gladness'),
        h('p', null, strong('favorites')),
        h('p', null, '\u21b3 Ursula K. Le Guin \u2014 A Wizard of Earthsea'),
        h('p', null, '\u21b3 Kaveh Akbar \u2014 Martyr!')
      ),

      gallery: () => h(Gallery, null),

      contact: () => h('div', { style: { display: 'flex', flexDirection: 'column', gap: 14 } },
        [
          { label: 'email',  val: 'samuel.s.everett [at] tcu [dot] edu', icon: '\u2709\uFE0F' },
          { label: 'signal', val: '@samsevr.95',                          icon: '\uD83D\uDCAC' },
        ].map(c =>
          h('div', { key: c.label, className: 'contact-row' },
            h('span', { className: 'contact-icon', 'aria-hidden': 'true' }, c.icon),
            h('span', { className: 'contact-label' }, c.label),
            h('span', null, c.val)
          )
        )
      ),
    };

    function Gallery() {
      const photos = [
        'sam.jpeg', 'gal-1.jpg', 'gal-2.jpeg', 'gal-3.jpg',
        'gal-4.jpg', 'gal-5.JPG', 'gal-6.JPG', 'gal-7.JPG', 'gal-8.JPG',
      ];
      const [idx, setIdx] = useState(0);
      const prev = () => setIdx(i => (i - 1 + photos.length) % photos.length);
      const next = () => setIdx(i => (i + 1) % photos.length);

      return h('div', { style: { display: 'flex', flexDirection: 'column', gap: 12 } },
        h('img', { src: photos[idx], className: 'gallery-img', alt: `Gallery photo ${idx + 1}` }),
        h('div', { className: 'gallery-nav' },
          h('button', { onClick: prev, className: 'gallery-btn', 'aria-label': 'Previous photo' }, '\u2190'),
          h('span', { className: 'gallery-pos' }, idx + 1, ' / ', photos.length),
          h('button', { onClick: next, className: 'gallery-btn', 'aria-label': 'Next photo' }, '\u2192')
        )
      );
    }

    function Desktop() {
      const [windows, setWindows] = useState([]);
      const [time, setTime] = useState(() =>
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      );
      const zRef   = useRef(10);
      const dragRef = useRef(null);

      useEffect(() => {
        const tick = setInterval(() =>
          setTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }))
        , 15000);
        return () => clearInterval(tick);
      }, []);

      useEffect(() => {
        const onMove = (e) => {
          if (!dragRef.current) return;
          const { id, sx, sy, ox, oy } = dragRef.current;
          const point = e.touches ? e.touches[0] : e;
          setWindows(ws => ws.map(w =>
            w.id === id
              ? { ...w, x: Math.max(0, ox + point.clientX - sx), y: Math.max(0, oy + point.clientY - sy) }
              : w
          ));
        };
        const onUp = () => { dragRef.current = null; };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup',   onUp);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend',  onUp);

        return () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup',   onUp);
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend',  onUp);
        };
      }, []);

      const bringToFront = (id) => {
        zRef.current += 1;
        const z = zRef.current;
        setWindows(ws => ws.map(w => w.id === id ? { ...w, z } : w));
      };

      const openWindow = (id) => {
        if (windows.find(w => w.id === id)) {
          setWindows(ws => ws.map(w => w.id === id ? { ...w, minimized: false } : w));
          bringToFront(id);
          return;
        }
        zRef.current += 1;
        const def = WINS[id];
        const mobile = window.innerWidth < 600;
        const w = mobile ? Math.min(window.innerWidth - 24, def.w) : def.w;
        const h = mobile ? Math.min(window.innerHeight - 100, def.h) : def.h;
        const x = mobile ? (window.innerWidth - w) / 2 : def.x;
        const y = mobile ? (window.innerHeight - h) / 3 : def.y;
        setWindows(ws => [...ws, { id, title: def.title, w, h, x, y, z: zRef.current, minimized: false }]);
      };

      const closeWin    = (id) => setWindows(ws => ws.filter(w => w.id !== id));
      const minimizeWin = (id) => setWindows(ws => ws.map(w => w.id === id ? { ...w, minimized: true } : w));

      const startDrag = (e, id, ox, oy) => {
        e.preventDefault();
        e.stopPropagation();
        bringToFront(id);
        const point = e.touches ? e.touches[0] : e;
        dragRef.current = { id, sx: point.clientX, sy: point.clientY, ox, oy };
      };

      return h(React.Fragment, null,
        h('div', { id: 'desktop', onTouchMove: (e) => e.preventDefault() },
          h('div', { className: 'icon-grid' },
            ITEMS.map(item =>
              h('div', {
                key: item.id, className: 'desk-icon', role: 'button', tabIndex: 0,
                'aria-label': `Open ${item.label}`,
                onClick: () => openWindow(item.id),
                onKeyDown: (e) => (e.key === 'Enter' || e.key === ' ') && openWindow(item.id),
              },
                h('span', { className: 'icon-img', 'aria-hidden': 'true' }, item.icon),
                h('span', { className: 'icon-label' }, item.label)
              )
            )
          ),
          windows.filter(w => !w.minimized).map(win =>
            h('div', {
              key: win.id, className: 'window',
              style: { left: win.x, top: win.y, width: win.w, zIndex: win.z },
              onMouseDown: () => bringToFront(win.id),
              onTouchStart: () => bringToFront(win.id),
            },
              h('div', {
                className: 'window-titlebar',
                onMouseDown: (e) => startDrag(e, win.id, win.x, win.y),
                onTouchStart: (e) => startDrag(e, win.id, win.x, win.y),
              },
                h('button', { className: 'traffic-btn btn-close', onClick: (e) => { e.stopPropagation(); closeWin(win.id); }, 'aria-label': 'Close window' }),
                h('button', { className: 'traffic-btn btn-min', onClick: (e) => { e.stopPropagation(); minimizeWin(win.id); }, 'aria-label': 'Minimize window' }),
                h('button', { className: 'traffic-btn btn-zoom', 'aria-label': 'Zoom window' }),
                h('span', { className: 'window-title' }, win.title)
              ),
              h('div', { className: 'window-body', style: { height: win.h } },
                CONTENT[win.id] && CONTENT[win.id]()
              )
            )
          )
        ),
        h('div', { id: 'taskbar' },
          h('span', { className: 'taskbar-logo' }, '\u2726'),
          h('span', { style: { fontSize: 11, color: 'rgba(255,255,255,0.5)', marginRight: 4, fontFamily: 'var(--font-ui)' } }, 'samsevrOS'),
          windows.map(win =>
            h('button', {
              key: win.id,
              className: `taskbar-btn ${win.minimized ? 'minimized' : 'active'}`,
              onClick: () => {
                setWindows(ws => ws.map(w => w.id === win.id ? { ...w, minimized: false } : w));
                bringToFront(win.id);
              },
            }, WINS[win.id].title)
          ),
          h('span', { className: 'taskbar-time' }, time)
        )
      );
    }

    const container = document.createElement('div');
    document.body.appendChild(container);
    ReactDOM.createRoot(container).render(h(Desktop));
  </script>

</body>
</html>
